<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — ТехноМаркет</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.6; }
        
        .header {
            background: #1a1a1a;
            padding: 1rem 2rem;
        }
        .header a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .header a:hover { color: white; }
        
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .form-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            padding: 2rem;
        }
        
        h1 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0066ff;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .btn {
            background: #0066ff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn:hover {
            background: #0052cc;
        }
        
        .current-image {
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #6b7280;
        }
        .current-image img {
            max-width: 100px;
            border-radius: 6px;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/admin">← Назад в админ-панель</a>
    </header>
    
    <div class="container">
        <div class="form-card">
            <h1>{{ title }}</h1>
            <form method="POST" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label>Название товара *</label>
                        <input type="text" name="name" value="{{ product.name if product else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <input type="text" name="category" value="{{ product.category if product else '' }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Цена *</label>
                        <input type="number" name="price" step="0.01" value="{{ product.price if product else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Количество на складе</label>
                        <input type="number" name="stock" value="{{ product.stock if product else 0 }}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description">{{ product.description if product else '' }}</textarea>
                </div>
                <div class="form-group">
                    <label>Изображение товара (PNG, JPG)</label>
                    <input type="file" name="image" accept="image/png,image/jpeg,image/gif,image/webp">
                    {% if product and product.image != 'default.png' %}
                    <div class="current-image">
                        Текущее изображение:
                        <img src="{{ url_for('static', filename='uploads/' + product.image) }}" style="max-width: 200px; max-height: 200px; border-radius: 8px;">
                    </div>
                    {% endif %}
                </div>
                <button type="submit" class="btn">Сохранить</button>
            </form>
        </div>
    </div>
</body>
</html>
