<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — ТехноМаркет</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}
        .header{background:#fff;padding:1rem 2rem;position:sticky;top:0;z-index:100;border-bottom:1px solid #e5e5e5}
        .header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.5rem;font-weight:700;color:#0066ff}
        .nav{display:flex;gap:2rem;align-items:center}
        .nav a{text-decoration:none;color:#666;font-size:.9rem;font-weight:500;display:flex;align-items:center;gap:.4rem;transition:color .2s}
        .nav a:hover{color:#0066ff}
        .cart-badge{background:#0066ff;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;margin-left:2px}
        .container{max-width:800px;margin:2rem auto;padding:0 1rem}
        .page-title{font-size:1.5rem;font-weight:600;margin-bottom:1.5rem}
        .cart-section,.checkout-section{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #e5e5e5}
        .cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid #f0f0f0;align-items:center}
        .cart-item:last-child{border-bottom:none}
        .cart-item-image{width:80px;height:80px;object-fit:cover;border-radius:8px;background:#f5f5f5}
        .cart-item-info{flex:1}
        .cart-item-name{font-weight:600;margin-bottom:.25rem}
        .cart-item-price{color:#0066ff;font-weight:600}
        .cart-item-subtotal{font-weight:600;font-size:.95rem;min-width:100px;text-align:right}
        .cart-item-qty{display:flex;align-items:center;gap:.5rem}
        .cart-item-qty input{width:60px;padding:.4rem;border:1px solid #e5e5e5;border-radius:6px;text-align:center;font-size:.9rem}
        .btn{display:inline-block;padding:.5rem 1rem;background:#0066ff;color:#fff;text-decoration:none;border-radius:8px;font-size:.85rem;font-weight:500;border:none;cursor:pointer;transition:background .2s}
        .btn:hover{background:#0052cc}
        .btn-danger{background:#ef4444;padding:.4rem .8rem;font-size:.8rem}
        .btn-danger:hover{background:#dc2626}
        .cart-total{text-align:right;padding-top:1rem;font-size:1.25rem;font-weight:700}
        .cart-total span{color:#0066ff}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:.4rem;font-weight:500;font-size:.9rem;color:#374151}
        .form-group input{width:100%;padding:.75rem 1rem;border:1px solid #e5e5e5;border-radius:8px;font-size:.95rem}
        .form-group input:focus{outline:none;border-color:#0066ff}
        .empty-cart{text-align:center;padding:3rem;color:#6b7280}
        .empty-cart p{margin-bottom:1rem;font-size:1.1rem}
        .footer{background:#1a1a1a;color:#fff;padding:2rem;text-align:center;margin-top:auto;font-size:.875rem}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">ТехноМаркет</div>
            <nav class="nav">
                <a href="/">Главная</a>
                <a href="/products">Товары</a>
                <a href="/cart">Корзина <span class="cart-badge" id="cart-count">0</span></a>
                <a href="/admin/login">Админ</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <h1 class="page-title">Корзина</h1>
        <div id="cart-content"></div>
    </main>
    <footer class="footer"><p>© 2026 ТехноМаркет</p></footer>
    <script>
    function getCart(){return JSON.parse(localStorage.getItem('cart')||'[]')}
    function saveCart(c){localStorage.setItem('cart',JSON.stringify(c));updateBadge()}
    function updateBadge(){document.getElementById('cart-count').textContent=getCart().length}
    function renderCart(){
        var cart=getCart(),el=document.getElementById('cart-content');
        if(!cart.length){
            el.innerHTML='<div class="cart-section"><div class="empty-cart"><p>Корзина пуста</p><a href="/products" class="btn">Перейти к товарам</a></div></div>';
            return;
        }
        var total=0,html='<div class="cart-section">';
        for(var i=0;i<cart.length;i++){
            var item=cart[i],sub=item.price*item.qty;total+=sub;
            var imgSrc = item.image || '/static/default.png';
            html+='<div class="cart-item"><img src="'+imgSrc+'" alt="'+item.name.replace(/"/g,'&quot;')+'" class="cart-item-image" onerror="this.src=\'/static/default.png\'"><div class="cart-item-info"><div class="cart-item-name">'+item.name+'</div><div class="cart-item-price">'+item.price+' ₽</div></div><div class="cart-item-qty"><input type="number" value="'+item.qty+'" min="1" onchange="changeQty('+i+',this.value)"><button class="btn btn-danger" onclick="removeItem('+i+')">Удалить</button></div><div class="cart-item-subtotal">'+sub+' ₽</div></div>';
        }
        html+='<div class="cart-total">Итого: <span>'+total+' ₽</span></div></div>';
        html+='<div class="checkout-section"><h2 style="font-size:1.2rem;margin-bottom:1rem;font-weight:600">Оформление заказа</h2><div class="form-group"><label>Ваше имя *</label><input type="text" id="f-name"></div><div class="form-group"><label>Телефон *</label><input type="tel" id="f-phone"></div><div class="form-group"><label>Адрес доставки *</label><input type="text" id="f-address"></div><button class="btn" style="width:100%;margin-top:.5rem" onclick="doCheckout()">Подтвердить заказ</button></div>';
        el.innerHTML=html;
    }
    function changeQty(i,val){var cart=getCart();cart[i].qty=Math.max(1,parseInt(val)||1);saveCart(cart);renderCart()}
    function removeItem(i){var cart=getCart();cart.splice(i,1);saveCart(cart);renderCart()}
    function doCheckout(){
        var name=document.getElementById('f-name').value.trim(),
            phone=document.getElementById('f-phone').value.trim(),
            address=document.getElementById('f-address').value.trim();
        if(!name||!phone||!address){alert('Заполните все поля');return}
        var cart=getCart();
        fetch('/checkout',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({name:name,phone:phone,address:address,items:cart.map(function(i){return{id:i.id,name:i.name,price:i.price,qty:i.qty}})})
        }).then(function(r){return r.json()}).then(function(d){
            if(d.ok){localStorage.removeItem('cart');alert('Заказ #'+d.order_id+' оформлен!');window.location.href='/'}
            else alert(d.error||'Ошибка')
        }).catch(function(){alert('Ошибка соединения')});
    }
    updateBadge();renderCart();
    </script>
</body>
</html>
